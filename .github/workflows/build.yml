name: Build and Release

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore ShopProToTrMenuConverter.csproj

      - name: Build project
        run: dotnet build ShopProToTrMenuConverter.csproj --configuration Release --no-restore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ShopProToTrMenuConverter-Windows
          path: bin/Release/net472/
          if-no-files-found: warn
          retention-days: 7

      - name: Create release zip
        run: |
          $outputDir = "bin/Release/net472"
          $zipPath = "ShopProToTrMenuConverter-net472.zip"
          if (Test-Path $outputDir) {
            if (Test-Path $zipPath) { Remove-Item $zipPath }
            Compress-Archive -Path "$outputDir/*" -DestinationPath $zipPath -Force
          }
        shell: pwsh

      - name: Upload release zip
        uses: actions/upload-artifact@v4
        with:
          name: ShopProToTrMenuConverter-net472
          path: ShopProToTrMenuConverter-net472.zip
          retention-days: 7

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ShopProToTrMenuConverter-net472
          path: .

      - name: Get version from tag
        id: get_version
        run: |
          $version = $env:GITHUB_REF -replace 'refs/tags/', ''
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ShopProToTrMenuConverter-net472.zip
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.get_version.outputs.version }}
          body: |
            ShopPro to TrMenu Converter - .NET Framework 4.7.2

            ### 使用方法
            1. 下载 `ShopProToTrMenuConverter-net472.zip`
            2. 解压到任意目录
            3. 运行 `ShopProToTrMenuConverter.exe`
            4. 按照提示输入ShopPro商店目录和输出目录

            或使用命令行参数：
            ```
            ShopProToTrMenuConverter.exe "E:\plugins\ShopPro\shops" "E:\plugins\TrMenu\menus\商店"
            ```

            ### 编译要求
            - .NET Framework 4.7.2 Runtime

            ### 功能特性
            - 支持收购商店 (type: sell) 和出售商店 (type: buy)
            - 自动转换ItemsAdder材质格式
            - 批量转换所有商店配置
            - 保留原始Lore格式
        generate_release_notes: false
