name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET Framework
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: nuget restore ShopProToTrMenuConverter.csproj

    - name: Build project
      run: msbuild ShopProToTrMenuConverter.csproj /p:Configuration=Release /p:Platform="Any CPU" /p:PlatformTarget="AnyCPU"

    - name: Create release zip
      run: |
        $outputDir = "ShopProToTrMenuConverter/bin/Release/net472"
        $zipPath = "ShopProToTrMenuConverter-net472.zip"
        if (Test-Path $zipPath) { Remove-Item $zipPath }
        Compress-Archive -Path "$outputDir/*" -DestinationPath $zipPath -Force
      shell: pwsh

    - name: Get version from tag
      id: get_version
      run: |
        $version = $env:GITHUB_REF -replace 'refs/tags/', ''
        echo "version=$version" >> $env:GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ShopProToTrMenuConverter-net472.zip
        tag_name: ${{ github.ref_name }}
        name: Release ${{ steps.get_version.outputs.version }}
        body: |
          ShopPro to TrMenu Converter - .NET Framework 4.7.2
          
          ### 使用方法
          1. 下载 `ShopProToTrMenuConverter-net472.zip`
          2. 解压到任意目录
          3. 运行 `ShopProToTrMenuConverter.exe`
          4. 按照提示输入ShopPro商店目录和输出目录
          
          或使用命令行参数：
          ```
          ShopProToTrMenuConverter.exe "E:\aaa\plugins\ShopPro\shops" "E:\aaa\plugins\TrMenu\menus\商店"
          ```
          
          ### 编译要求
          - .NET Framework 4.7.2 Runtime
          
          ### 功能特性
          - 支持收购商店 (type: sell) 和出售商店 (type: buy)
          - 自动转换ItemsAdder材质格式
          - 批量转换所有商店配置
      generate_release_notes: false
